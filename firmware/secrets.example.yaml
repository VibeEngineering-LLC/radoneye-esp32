# ╔══════════════════════════════════════════════════════════════╗
# ║  secrets.example.yaml — шаблон. Скопируй в secrets.yaml,    ║
# ║  заполни своими значениями. secrets.yaml — в .gitignore!     ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Шаблон под обе прошивки скилла:
#   - xiao-esp32-c3/radon_ha_gateway_c3.yaml  (актуальная, 2026-06-17)
#   - esp32-classic/radon_ha_gateway.yaml     (baseline, ESP32-DevKitC)
#
# Оба YAML делят общий блок !secret-ключей (одна плата = одна WiFi
# сеть, один API/OTA, один MAC прибора). Если хочешь параллельно
# держать два шлюза на одной WiFi — задай отдельные api_encryption_key
# / ota_password второму экземпляру через копию secrets.yaml и второй
# device_name в YAML.

# ── WiFi домашней сети ────────────────────────────────────────
# RadonEye Plus2 + ESP32-шлюз = только 2.4 GHz (BLE+WiFi coex на
# одном радио, 5 GHz не поддерживается ни одной из плат).
wifi_ssid: "ИмяТвоейСети"
wifi_password: "парольWiFi"

# ── Fallback AP-пароль ─────────────────────────────────────────
# Если плата не подключилась к домашней WiFi (новая прошивка,
# смена SSID, captive timeout) — поднимает свою AP
# «radon-gw Fallback» (C3) или «radon-ha Fallback» (DevKitC) с этим
# паролем. Минимум 8 символов.
ap_password: "придумайСвойAPпароль"

# ── ESPHome API encryption (для Home Assistant) ───────────────
# Сгенерировать новый ключ (base64, 32 байта):
#   python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
# Этот же ключ ввести в HA при добавлении интеграции ESPHome.
api_encryption_key: "0000000000000000000000000000000000000000000=="

# ── OTA-пароль ─────────────────────────────────────────────────
# Любая строка ≥8 символов. Защищает от случайной перепрошивки с
# чужого устройства в той же сети.
#
# ⚠ В текущих YAML (v2.1-c3 и v2.0 DevKitC) этот же `ota_password`
# используется как пароль для Web UI Basic Auth (username = "radon"
# в обоих профилях, см. блок `web_server.auth:` внутри YAML). Если
# хочешь развести их — добавь отдельный `web_server_auth_pass` в
# secrets.yaml и поменяй YAML в одном месте.
#
# Сгенерировать сильный пароль:
#   python -c "import secrets; print(secrets.token_urlsafe(18))"
ota_password: "придумайСвойOTAпароль"

# ── MAC RadonEye Plus2 (RD200PLUS) ─────────────────────────────
# Можно оставить заглушкой `AA:BB:CC:DD:EE:FF` — после первой
# заливки задаётся через Web UI:
#   http://radon-gw.local/ (C3) или http://radon-ha-gateway.local/ (DevKitC)
#   → группа «Поиск BLE» → «Запустить скан 30 с»
#   → найти `FR:PD<серийник>` (advertising префикс Plus2)
#   → скопировать MAC → вставить в «MAC Radon 1» → «Применить»
#
# Формат UPPERCASE с двоеточиями.
# Прибор должен быть в радиусе ≤5 м от ESP во время скана.
radon1_mac: "AA:BB:CC:DD:EE:FF"

# ─────────────────────────────────────────────────────────────
# ℹ Параметры, удалённые из этого шаблона (присутствовали раньше):
#   - radon2_mac / radon3_mac — старая DevKitC прошивка
#     поддерживала до 3 приборов одновременно. В актуальной
#     v2.1-c3 каждый шлюз обслуживает ОДИН прибор (одна плата —
#     один RadonEye). Если нужны 2-3 прибора — поднять 2-3 шлюза,
#     задать на каждом свой `radon1_mac`.
#   - web_server_auth_user / web_server_auth_pass — в текущих YAML
#     не используются как отдельные secret-ключи (username задан
#     inline в YAML, password = ota_password). Если разнесёшь —
#     добавь сюда.
# ─────────────────────────────────────────────────────────────
